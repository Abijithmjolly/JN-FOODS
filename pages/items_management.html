<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">

              "error": "#ba1a1a",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f3f3f3; /* surface_container_low */
            font-family: 'Inter', sans-serif;
        }
        .editorial-header {
            padding-top: 8.5rem; /* Spacing-24 per Design System */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#f9f9f9] dark:bg-neutral-900 w-full top-0 z-50 fixed">
<div class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#0d631b] dark:text-green-500" data-icon="bakery_dining">bakery_dining</span>
<h1 class="font-manrope text-2xl font-bold tracking-tight text-[#1a1c1c] dark:text-neutral-100"><span style="font-family: Manrope; font-size: 20px; letter-spacing: -0.5px; background-color: rgb(255, 255, 255);">JN FOODS</span></h1>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-neutral-500 dark:text-neutral-400 hover:opacity-80 transition-opacity font-medium" href="owner_dashboard.html">Dashboard</a>
<a class="text-neutral-500 dark:text-neutral-400 hover:opacity-80 transition-opacity font-medium" href="stores_management.html">Stores</a>
<a class="text-[#0d631b] dark:text-green-400 hover:opacity-80 transition-opacity font-bold" href="items_management.html">Items</a>
</div>
<button class="material-symbols-outlined text-on-surface hover:opacity-80 transition-opacity" data-icon="account_circle">account_circle</button>
</div>
</header>
<main class="max-w-7xl mx-auto px-8">
<!-- Editorial Headline Section -->
<section class="editorial-header mb-12">
<div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
<div>
<h2 class="font-headline text-5xl md:text-6xl font-extrabold tracking-tighter text-on-surface">Bakery Products</h2>
<p class="text-on-surface-variant font-body mt-4 text-lg max-w-xl">Curate your daily artisanal offerings. Precision in ingredients, excellence in every batch.</p>
</div>
<button class="bg-gradient-to-r from-primary to-primary-container text-on-primary h-[70px] px-10 rounded-lg font-headline text-lg font-bold flex items-center gap-3 active:scale-95 transition-transform duration-200 shadow-lg">
<span class="material-symbols-outlined" data-icon="add" data-weight="fill" style="font-variation-settings: &quot;FILL&quot; 1;">add</span>
                    Add Item
                </button>
</div>
</section>
<!-- Search & Filter Bar -->
<section class="mb-16">
<div class="relative group">
<div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="search">search</span>
</div>
<input class="w-full h-[70px] pl-16 pr-8 bg-surface-container-low border-none rounded-lg font-body text-xl text-on-surface placeholder:text-outline focus:bg-surface-container-lowest focus:ring-0 transition-all duration-300 shadow-sm group-hover:shadow-md" placeholder="Search by name, category, or SKU..." type="text">
</div>
</section>
<!-- Items Bento Grid -->
<section id="items-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <!-- Dynamic Items Loaded from js/items.js -->
</section>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-neutral-900/80 backdrop-blur-xl border-t border-neutral-100 dark:border-neutral-800 shadow-[0_-4px_20px_0_rgba(0,0,0,0.06)] z-50">
<a class="flex flex-col items-center justify-center text-neutral-500 dark:text-neutral-500 px-6 py-3 hover:bg-neutral-50 transition-transform active:scale-[0.98]" href="owner_dashboard.html">
<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span class="font-inter text-[0.75rem] font-medium uppercase tracking-wider">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 dark:text-neutral-500 px-6 py-3 hover:bg-neutral-50 transition-transform active:scale-[0.98]" href="stores_management.html">
<span class="material-symbols-outlined mb-1" data-icon="storefront">storefront</span>
<span class="font-inter text-[0.75rem] font-medium uppercase tracking-wider">Stores</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#eeeeee] dark:bg-neutral-800 text-[#0d631b] dark:text-green-400 rounded-[2rem] px-6 py-3 active:scale-[0.98]" href="items_management.html" style="">
<span class="material-symbols-outlined mb-1" data-icon="bakery_dining" style="">bakery_dining</span>
<span class="font-inter text-[0.75rem] font-medium uppercase tracking-wider" style="">Items</span>
</a>
<button id="logout-btn" class="flex flex-col items-center text-on-surface-variant hover:text-error transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="logout">logout</span>
<span class="font-inter text-[0.75rem] font-medium uppercase tracking-wider">Logout</span>
</button>
</nav>
<script type="module" src="../js/auth.js"></script>
<script type="module" src="../js/items.js"></script>
<script type="module">
    import { signOut } from '../js/auth.js';
    document.getElementById('logout-btn')?.addEventListener('click', signOut);
</script>
</body></html>
