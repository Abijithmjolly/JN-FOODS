<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>JN FOODS - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d631b",
                        "primary-container": "#2e7d32",
                        "on-primary": "#ffffff",
                        "surface": "#f9f9f9",
                        "surface-container-highest": "#e2e2e2",
                        "on-surface": "#1a1c1c",
                        "on-surface-variant": "#40493d",
                        "outline": "#707a6c",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1 { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-[2rem] p-10 shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-surface-container-highest">
        <div class="flex flex-col items-center mb-10">
            <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-6">
                <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">bakery_dining</span>
            </div>
            <h1 class="text-3xl font-extrabold text-on-surface tracking-tighter">JN FOODS</h1>
            <p class="text-on-surface-variant text-sm mt-2 font-medium">Business Management Portal</p>
        </div>

        <form id="auth-form" class="space-y-6">
            <div class="space-y-2">
                <label for="email" class="text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Email Address</label>
                <input type="email" id="email" required 
                    class="w-full h-14 bg-surface px-6 rounded-xl border border-surface-container-highest font-medium focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                    placeholder="name@business.com">
            </div>

            <div class="space-y-2">
                <label for="password" class="text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Password</label>
                <input type="password" id="password" required 
                    class="w-full h-14 bg-surface px-6 rounded-xl border border-surface-container-highest font-medium focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                    placeholder="••••••••">
            </div>

            <div id="confirm-password-group" class="space-y-2 hidden">
                <label for="confirm-password" class="text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Confirm Password</label>
                <input type="password" id="confirm-password"
                    class="w-full h-14 bg-surface px-6 rounded-xl border border-surface-container-highest font-medium focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                    placeholder="••••••••">
            </div>

            <div id="error-message" class="hidden p-4 bg-error/10 text-error rounded-xl text-sm font-medium border border-error/20">
                Invalid credentials. Please try again.
            </div>

            <div id="success-message" class="hidden p-4 bg-primary/10 text-primary rounded-xl text-sm font-medium border border-primary/20">
                Account created! Please check your email for confirmation.
            </div>

            <button type="submit" id="submit-btn" 
                class="w-full h-[64px] bg-primary text-on-primary rounded-xl font-headline font-bold text-lg flex items-center justify-center gap-3 hover:bg-primary-container active:scale-[0.98] transition-all shadow-lg mt-8">
                <span id="btn-text">Sign In</span>
                <span id="btn-icon" class="material-symbols-outlined">login</span>
            </button>
        </form>

        <div class="mt-8 text-center">
            <button id="toggle-mode" class="text-primary font-bold text-sm hover:underline">
                Don't have an account? Sign Up
            </button>
        </div>
    </div>

    <script type="module" src="../js/auth.js"></script>
</body>
</html>
